name: Update HTB Stats

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch HTB profile
        run: |
          curl -sL --max-time 15 "https://labs.hackthebox.com/api/v4/profile/2589442" > /tmp/profile.json || true

      - name: Fetch HTB season ranks
        run: |
          curl -sL --max-time 15 "https://labs.hackthebox.com/api/v4/season/user/2589442/ranks" > /tmp/season.json || true

      - name: Generate htb-data.json
        run: |
          python3 << 'PYEOF'
          import json
          from datetime import datetime, timezone

          prev = {}
          try:
              with open('htb-data.json') as f:
                  prev = json.load(f)
          except (json.JSONDecodeError, FileNotFoundError):
              pass

          # ── Profile ──────────────────────────────────────────────
          try:
              with open('/tmp/profile.json') as f:
                  raw = json.load(f)
              p = raw.get('profile', raw)
              if not p.get('id'): raise ValueError
          except (json.JSONDecodeError, FileNotFoundError, ValueError):
              p = prev.get('user', {})
              p['rank_id'] = prev.get('rank', {}).get('id', 3)
              p['rank'] = prev.get('rank', {}).get('title', 'Hacker')
              p['user_owns'] = prev.get('stats', {}).get('machines', 0)
              p['system_owns'] = prev.get('stats', {}).get('machinesRooted', 0)

          # ── Season ───────────────────────────────────────────────
          try:
              with open('/tmp/season.json') as f:
                  season_data = json.load(f)
              season_entry = next(
                  (s for s in season_data.get('data', []) if s.get('season_id')),
                  season_data.get('data', [None])[0]
              )
              if not season_entry or not season_entry.get('league'): raise ValueError
          except (json.JSONDecodeError, FileNotFoundError, ValueError, TypeError):
              season_entry = prev.get('season', {})

          data = {
              'updated': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
              'user': {'id': p.get('id', 2589442), 'name': p.get('name', 'thesungod25')},
              'rank': {'id': p.get('rank_id', 3), 'title': p.get('rank', 'Hacker')},
              'season': {
                  'id': season_entry.get('season_id', 15),
                  'name': season_entry.get('season_name', 'Season 11'),
                  'league': season_entry.get('league', 'Ruby'),
                  'rank': season_entry.get('rank', 0),
                  'totalParticipants': season_entry.get('total_ranks', 0),
                  'points': season_entry.get('total_season_points', 0),
                  'active': True,
              },
              'stats': {
                  'machines': p.get('user_owns', 0),
                  'machinesRooted': p.get('system_owns', 0),
                  'challenges': 18,
                  'sherlocks': 2,
              },
          }

          with open('htb-data.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')

          print(f"OK — machines={data['stats']['machines']} season_rank={data['season']['rank']} season_points={data['season']['points']}")
          PYEOF

      - name: Commit & push if changed
        run: |
          git config user.name "htb-bot"
          git config user.email "htb-bot@users.noreply.github.com"
          git add htb-data.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "auto: update HTB stats [skip ci]"
            git push
          fi
